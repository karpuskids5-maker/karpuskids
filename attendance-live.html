<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ponche Digital — Karpus Kids</title>
  <link rel="stylesheet" href="css/karpus-tailwind.css">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: 'Poppins', sans-serif; background: #0f172a; color: white; overflow: hidden; }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; height: 100dvh; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
    .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; gap: 12px; overflow: hidden; }

    /* ── Scanner ── */
    .scanner-wrap { position: relative; width: min(92vw, 520px); aspect-ratio: 1; border-radius: 24px; overflow: hidden; background: #000; box-shadow: 0 0 0 4px rgba(251,146,60,0.4), 0 25px 50px rgba(0,0,0,0.5); }
    #reader { width: 100% !important; height: 100% !important; border: none !important; }
    #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
    #reader__scan_region { background: transparent !important; }
    #reader__dashboard { display: none !important; }

    /* Corner brackets */
    .corner { position: absolute; width: 36px; height: 36px; border-color: #fb923c; border-style: solid; z-index: 10; }
    .corner-tl { top: 12px; left: 12px; border-width: 4px 0 0 4px; border-radius: 8px 0 0 0; }
    .corner-tr { top: 12px; right: 12px; border-width: 4px 4px 0 0; border-radius: 0 8px 0 0; }
    .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 4px 4px; border-radius: 0 0 0 8px; }
    .corner-br { bottom: 12px; right: 12px; border-width: 0 4px 4px 0; border-radius: 0 0 8px 0; }

    /* Scan line */
    .scan-line { position: absolute; left: 12px; right: 12px; height: 3px; background: linear-gradient(90deg, transparent, #fb923c, transparent); box-shadow: 0 0 12px 4px rgba(251,146,60,0.6); animation: scan 2.5s ease-in-out infinite; z-index: 10; border-radius: 2px; }
    @keyframes scan { 0%,100% { top: 12px; opacity: 0.4; } 50% { top: calc(100% - 15px); opacity: 1; } }

    /* ── Stats ── */
    .stats { display: flex; gap: 10px; width: min(90vw, 420px); }
    .stat { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 10px 14px; text-align: center; }
    .stat-val { font-size: 1.6rem; font-weight: 900; line-height: 1; }
    .stat-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; margin-top: 2px; }

    /* ── Overlay ── */
    .overlay { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .overlay.show { opacity: 1; pointer-events: all; }
    .result-card { background: #1e293b; border-radius: 28px; padding: 32px 28px; width: min(90vw, 360px); text-align: center; border: 1px solid rgba(255,255,255,0.1); transform: scale(0.9); transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
    .overlay.show .result-card { transform: scale(1); }
    .result-icon { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .result-name { font-size: 1.4rem; font-weight: 900; margin-bottom: 4px; }
    .result-role { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; opacity: 0.5; margin-bottom: 12px; }
    .result-msg { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
    .result-time { display: inline-block; background: rgba(255,255,255,0.08); border-radius: 12px; padding: 8px 20px; font-size: 1.3rem; font-weight: 900; font-variant-numeric: tabular-nums; }

    /* ── Hint ── */
    .hint { font-size: 11px; font-weight: 600; opacity: 0.4; text-align: center; }

    /* ── Responsive ── */
    @media (max-height: 700px) {
      .scanner-wrap { width: min(80vw, 320px); }
      .stats { width: min(80vw, 320px); }
      .result-card { padding: 24px 20px; }
      .result-icon { width: 64px; height: 64px; }
    }
    @media (min-width: 768px) {
      .scanner-wrap { width: min(70vw, 620px); }
      .stats { width: min(70vw, 620px); }
    }
    @media (min-width: 1024px) {
      .scanner-wrap { width: min(60vw, 700px); }
      .stats { width: min(60vw, 700px); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:36px;height:36px;background:#fb923c;border-radius:10px;display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><rect x="7" y="7" width="3" height="3"/><rect x="14" y="7" width="3" height="3"/><rect x="7" y="14" width="3" height="3"/><path d="M14 14h3v3h-3z"/></svg>
      </div>
      <div>
        <div style="font-size:14px;font-weight:900;line-height:1;">Ponche Digital</div>
        <div style="font-size:9px;font-weight:700;opacity:0.5;text-transform:uppercase;letter-spacing:0.1em;">Karpus Kids</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div id="clock" style="font-size:18px;font-weight:900;font-variant-numeric:tabular-nums;background:rgba(255,255,255,0.08);padding:6px 14px;border-radius:10px;">00:00:00</div>
      <a href="panel_directora.html" style="font-size:10px;font-weight:700;opacity:0.4;text-decoration:none;color:white;text-transform:uppercase;letter-spacing:0.08em;">← Panel</a>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Scanner -->
    <div class="scanner-wrap">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="scan-line"></div>
      <div id="reader"></div>
    </div>

    <p class="hint">Apunta la cámara al código QR del estudiante o personal</p>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="count-in" style="color:#4ade80;">0</div>
        <div class="stat-lbl">Entradas</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="count-out" style="color:#60a5fa;">0</div>
        <div class="stat-lbl">Salidas</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="count-total" style="color:#fb923c;">0</div>
        <div class="stat-lbl">Total hoy</div>
      </div>
    </div>

  </main>
</div>

<!-- Result Overlay -->
<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="result-icon" id="res-icon"></div>
    <div class="result-name" id="res-name">—</div>
    <div class="result-role" id="res-role">—</div>
    <div class="result-msg" id="res-msg">—</div>
    <div class="result-time" id="res-time">—</div>
  </div>
</div>

<script type="module">
import { supabase } from './js/shared/supabase.js';

let isProcessing = false;
let lastScan = '';
let scanTimeout;

// ── Clock ────────────────────────────────────────────────────────────────────
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('es-DO', { hour12: false });
}
tick();
setInterval(tick, 1000);

// ── Stats ────────────────────────────────────────────────────────────────────
async function updateStats() {
  const today = new Date().toISOString().split('T')[0];
  const { data } = await supabase
    .from('attendance')
    .select('status, check_in, check_out')
    .eq('date', today);

  const ins   = (data || []).filter(a => a.check_in).length;
  const outs  = (data || []).filter(a => a.check_out).length;
  const total = (data || []).length;

  document.getElementById('count-in').textContent    = ins;
  document.getElementById('count-out').textContent   = outs;
  document.getElementById('count-total').textContent = total;
}
updateStats();

// ── Scanner ──────────────────────────────────────────────────────────────────
const scanner = new Html5Qrcode('reader');

scanner.start(
  { facingMode: 'environment' },
  { fps: 12, qrbox: { width: 320, height: 320 }, aspectRatio: 1 },
  onScan
).catch(() => {
  document.getElementById('reader').innerHTML =
    '<div style="padding:40px;text-align:center;color:#f87171;font-size:13px;font-weight:700;">No se pudo acceder a la cámara.<br>Permite los permisos e intenta de nuevo.</div>';
});

// ── Scan handler ─────────────────────────────────────────────────────────────
async function onScan(raw) {
  if (isProcessing || raw === lastScan) return;
  isProcessing = true;
  lastScan = raw;
  clearTimeout(scanTimeout);
  scanTimeout = setTimeout(() => { lastScan = ''; }, 5000);

  try {
    // Parse QR — puede ser JSON {matricula, name, type} o string plano
    let matricula = raw.trim();
    let qrName = null;
    let qrType = null;

    try {
      const parsed = JSON.parse(raw);
      if (parsed.matricula) {
        matricula = parsed.matricula;
        qrName    = parsed.name || null;
        qrType    = parsed.type || null; // 'karpus-access' | 'karpus-staff'
      }
    } catch (_) { /* string plano — usar como matrícula directa */ }

    // Buscar en students primero, luego en profiles (staff)
    let person = null;
    let personType = 'student';

    // 1. Buscar estudiante por matrícula
    const { data: student } = await supabase
      .from('students')
      .select('id, name, classroom_id, classrooms:classroom_id(name), is_active')
      .eq('matricula', matricula)
      .maybeSingle();

    if (student && student.is_active) {
      person = student;
      personType = 'student';
    } else if (qrType === 'karpus-staff' || !student) {
      // 2. Buscar en profiles (personal)
      const { data: staff } = await supabase
        .from('profiles')
        .select('id, name, role, avatar_url')
        .eq('notes', matricula) // matricula guardada en notes
        .maybeSingle();

      if (staff) {
        person = staff;
        personType = 'staff';
      }
    }

    if (!person) {
      showResult('error', qrName || 'Desconocido', '', 'QR no registrado', new Date());
      return;
    }

    // Registrar ponche
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const timeStr = now.toLocaleTimeString('es-DO', { hour: '2-digit', minute: '2-digit', hour12: true });

    if (personType === 'student') {
      // Verificar si ya tiene check_in hoy
      const { data: existing } = await supabase
        .from('attendance')
        .select('id, check_in, check_out, status')
        .eq('student_id', person.id)
        .eq('date', today)
        .maybeSingle();

      if (!existing || !existing.check_in) {
        // Entrada
        await supabase.from('attendance').upsert({
          student_id:   person.id,
          classroom_id: person.classroom_id,
          date:         today,
          status:       'present',
          check_in:     now.toISOString()
        }, { onConflict: 'student_id,date' });

        showResult('in', person.name, person.classrooms?.name || 'Estudiante', '✅ Entrada registrada', now);
      } else if (!existing.check_out) {
        // Salida
        await supabase.from('attendance')
          .update({ check_out: now.toISOString(), status: 'retirado' })
          .eq('id', existing.id);

        showResult('out', person.name, person.classrooms?.name || 'Estudiante', '👋 Salida registrada', now);
      } else {
        showResult('warn', person.name, 'Ya registrado', 'Entrada y salida ya registradas', now);
      }
    } else {
      // Staff — registrar en attendance con classroom_id null
      const { data: existing } = await supabase
        .from('attendance')
        .select('id, check_in, check_out')
        .eq('student_id', person.id) // reutilizamos student_id para staff
        .eq('date', today)
        .maybeSingle();

      if (!existing || !existing.check_in) {
        await supabase.from('attendance').upsert({
          student_id: person.id,
          date:       today,
          status:     'present',
          check_in:   now.toISOString()
        }, { onConflict: 'student_id,date' });
        showResult('in', person.name, person.role || 'Personal', '✅ Entrada registrada', now);
      } else if (!existing.check_out) {
        await supabase.from('attendance')
          .update({ check_out: now.toISOString() })
          .eq('id', existing.id);
        showResult('out', person.name, person.role || 'Personal', '👋 Salida registrada', now);
      } else {
        showResult('warn', person.name, 'Ya registrado', 'Entrada y salida ya registradas', now);
      }
    }

    updateStats();

  } catch (err) {
    showResult('error', 'Error', '', 'Fallo de conexión', new Date());
  } finally {
    setTimeout(() => { isProcessing = false; }, 2500);
  }
}

// ── UI Feedback ───────────────────────────────────────────────────────────────
const COLORS = {
  in:    { bg: '#16a34a', shadow: 'rgba(22,163,74,0.4)',  icon: '✅', msg_color: '#4ade80' },
  out:   { bg: '#2563eb', shadow: 'rgba(37,99,235,0.4)',  icon: '👋', msg_color: '#60a5fa' },
  warn:  { bg: '#d97706', shadow: 'rgba(217,119,6,0.4)',  icon: '⚠️', msg_color: '#fbbf24' },
  error: { bg: '#dc2626', shadow: 'rgba(220,38,38,0.4)',  icon: '❌', msg_color: '#f87171' },
};

let hideTimer;
function showResult(type, name, role, msg, time) {
  const cfg = COLORS[type] || COLORS.error;
  const overlay = document.getElementById('overlay');

  document.getElementById('res-icon').style.cssText =
    `background:${cfg.bg};box-shadow:0 0 40px ${cfg.shadow};font-size:2rem;`;
  document.getElementById('res-icon').textContent = cfg.icon;
  document.getElementById('res-name').textContent = name;
  document.getElementById('res-role').textContent = role;
  document.getElementById('res-msg').style.color  = cfg.msg_color;
  document.getElementById('res-msg').textContent  = msg;
  document.getElementById('res-time').textContent =
    time.toLocaleTimeString('es-DO', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });

  overlay.classList.add('show');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => overlay.classList.remove('show'), type === 'error' ? 4000 : 3000);
}

// Tap overlay to dismiss
document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
});
</script>
</body>
</html>
