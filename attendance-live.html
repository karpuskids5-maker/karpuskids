<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ponche Digital - Karpus Kids</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; overflow: hidden; }
    .scanner-box { position: relative; width: 100%; max-width: 500px; aspect-ratio: 1; margin: 0 auto; overflow: hidden; border-radius: 2rem; border: 8px solid #f8fafc; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    #reader { width: 100% !important; border: none !important; }
    #reader__scan_region { background: white !important; }
    video { object-fit: cover !important; }
    .status-overlay { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: rgba(59, 130, 246, 0.5); box-shadow: 0 0 15px 5px rgba(59, 130, 246, 0.5); animation: scan 2s linear infinite; z-index: 10; }
    @keyframes scan { from { top: 0; } to { top: 100%; } }
  </style>
</head>
<body class="bg-slate-50 flex flex-col h-screen">

  <!-- Header -->
  <header class="p-6 bg-white shadow-sm flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-orange-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
      </div>
      <div>
        <h1 class="text-xl font-extrabold text-slate-800 leading-none">Karpus Kids</h1>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Ponche Digital</p>
      </div>
    </div>
    <div id="clock" class="text-2xl font-black text-slate-700 bg-slate-100 px-4 py-2 rounded-xl">00:00:00</div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col items-center justify-center p-4 gap-8">
    
    <!-- Scanner Container -->
    <div class="w-full max-w-lg text-center">
      <div class="scanner-box bg-black">
        <div class="scan-line"></div>
        <div id="reader"></div>
      </div>
      <p class="mt-6 text-slate-500 font-medium">Muestra el código QR del estudiante frente a la cámara</p>
    </div>

    <!-- Instructions / Stats -->
    <div class="grid grid-cols-2 gap-4 w-full max-w-md">
      <div class="bg-emerald-50 p-4 rounded-3xl border border-emerald-100 text-center">
        <div class="text-[10px] font-black text-emerald-600 uppercase mb-1">Entradas hoy</div>
        <div id="count-in" class="text-2xl font-black text-emerald-700">0</div>
      </div>
      <div class="bg-blue-50 p-4 rounded-3xl border border-blue-100 text-center">
        <div class="text-[10px] font-black text-blue-600 uppercase mb-1">Salidas hoy</div>
        <div id="count-out" class="text-2xl font-black text-blue-700">0</div>
      </div>
    </div>
  </main>

  <!-- Overlay de Resultado (Cargado por JS) -->
  <div id="result-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-md hidden">
    <div id="status-card" class="bg-white rounded-[3rem] p-10 max-w-sm w-full mx-4 shadow-2xl text-center transform transition-all scale-90 opacity-0">
      <div id="status-icon" class="w-24 h-24 mx-auto mb-6 rounded-full flex items-center justify-center text-white">
        <!-- Icono dinámico -->
      </div>
      <h2 id="status-name" class="text-2xl font-extrabold text-slate-800 mb-2">Nombre Estudiante</h2>
      <p id="status-msg" class="text-lg font-bold text-slate-500 mb-6 uppercase tracking-wide">Registro - Entrada</p>
      <div id="status-time" class="inline-block px-6 py-2 bg-slate-100 rounded-2xl text-xl font-black text-slate-700 italic">08:05 AM</div>
    </div>
  </div>

  <!-- Audio fallbacks -->
  <audio id="audio-success" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
  <audio id="audio-error" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

  <script type="module">
    import { supabase } from './js/shared/supabase.js';

    let html5QrCode;
    let isProcessing = false;
    let lastScan = '';
    let scanTimeout;

    // ── INICIALIZACIÓN ───────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      startScanner();
      updateClock();
      setInterval(updateClock, 1000);
      updateStats();
    });

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('es-DO', { hour12: false });
    }

    async function updateStats() {
      const today = new Date().toISOString().split('T')[0];
      const { data } = await supabase.from('attendance').select('status').eq('date', today);
      const ins = data?.filter(a => ['present', 'late'].includes(a.status)).length || 0;
      const outs = data?.filter(a => a.status === 'retirado').length || 0;
      document.getElementById('count-in').textContent = ins;
      document.getElementById('count-out').textContent = outs;
    }

    // ── ESCÁNER ───────────────────────────────────────────────────────────────────
    function startScanner() {
      html5QrCode = new Html5Qrcode("reader");
      const config = { fps: 10, qrbox: { width: 250, height: 250 } };
      
      html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess
      ).catch(err => {
        console.error("Error al iniciar cámara:", err);
        alert("No se pudo acceder a la cámara. Por favor permite los permisos.");
      });
    }

    async function onScanSuccess(decodedText) {
      if (isProcessing || decodedText === lastScan) return;
      
      isProcessing = true;
      lastScan = decodedText;
      clearTimeout(scanTimeout);
      scanTimeout = setTimeout(() => { lastScan = ''; }, 5000); // Evitar escaneos repetidos en 5s

      try {
        console.log("Matrícula escaneada:", decodedText);
        
        // 1. Llamar al RPC en Supabase
        const { data, error } = await supabase.rpc('process_student_punch', { 
          p_matricula: decodedText.trim() 
        });

        if (error) throw error;

        if (data.success) {
          showStatus(data);
          document.getElementById('audio-success').play().catch(() => {});
          updateStats();
        } else {
          showError(data.message);
          document.getElementById('audio-error').play().catch(() => {});
        }

      } catch (err) {
        console.error("Error en ponche:", err);
        showError("Error de conexión o código inválido");
      } finally {
        setTimeout(() => { isProcessing = false; }, 2000);
      }
    }

    // ── UI FEEDBACK ──────────────────────────────────────────────────────────────
    function showStatus(res) {
      const overlay = document.getElementById('result-overlay');
      const card = document.getElementById('status-card');
      const icon = document.getElementById('status-icon');
      const name = document.getElementById('status-name');
      const msg = document.getElementById('status-msg');
      const time = document.getElementById('status-time');

      overlay.classList.remove('hidden');
      card.classList.remove('scale-90', 'opacity-0');
      card.classList.add('scale-100', 'opacity-100');

      name.textContent = res.student_name;
      time.textContent = res.time;
      
      if (res.type === 'check_in') {
        icon.className = "w-24 h-24 mx-auto mb-6 rounded-full flex items-center justify-center text-white bg-emerald-500 shadow-xl shadow-emerald-200";
        icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11"></polyline></svg>';
        msg.textContent = res.message;
        msg.className = "text-lg font-bold text-emerald-600 mb-6 uppercase tracking-wide";
      } else {
        icon.className = "w-24 h-24 mx-auto mb-6 rounded-full flex items-center justify-center text-white bg-blue-500 shadow-xl shadow-blue-200";
        icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>';
        msg.textContent = res.message;
        msg.className = "text-lg font-bold text-blue-600 mb-6 uppercase tracking-wide";
      }

      setTimeout(hideOverlay, 3000);
    }

    function showError(message) {
      const overlay = document.getElementById('result-overlay');
      const card = document.getElementById('status-card');
      const icon = document.getElementById('status-icon');
      const name = document.getElementById('status-name');
      const msg = document.getElementById('status-msg');
      const time = document.getElementById('status-time');

      overlay.classList.remove('hidden');
      card.classList.remove('scale-90', 'opacity-0');
      card.classList.add('scale-100', 'opacity-100');

      icon.className = "w-24 h-24 mx-auto mb-6 rounded-full flex items-center justify-center text-white bg-rose-500 shadow-xl shadow-rose-200";
      icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
      
      name.textContent = "Error";
      msg.textContent = message;
      msg.className = "text-lg font-bold text-rose-600 mb-6 uppercase tracking-wide";
      time.textContent = "--:--";

      setTimeout(hideOverlay, 4000);
    }

    function hideOverlay() {
      const overlay = document.getElementById('result-overlay');
      const card = document.getElementById('status-card');
      card.classList.add('scale-90', 'opacity-0');
      setTimeout(() => { overlay.classList.add('hidden'); }, 300);
    }

  </script>
</body>
</html>
