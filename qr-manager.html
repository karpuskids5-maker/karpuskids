<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de QRs - Karpus Kids</title>
  <link rel="stylesheet" href="css/karpus-tailwind.css">
  <!-- cdn.tailwindcss.com no debe usarse en producción. Procesar localmente. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
    .qr-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .qr-card:hover { transform: translateY(-5px); }
    @media print {
      .no-print { display: none !important; }
      .print-area { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 20px !important; padding: 0 !important; }
      .qr-card { break-inside: avoid; border: 1px solid #eee !important; box-shadow: none !important; margin-bottom: 20px; }
      body { background: white; }
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-6xl mx-auto">
    <!-- Header -->
    <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12 no-print">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-indigo-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="3"></rect><rect x="14" y="7" width="3" height="3"></rect><rect x="7" y="14" width="3" height="3"></rect><path d="M14 14h3v3h-3z"></path></svg>
        </div>
        <div>
          <h1 class="text-3xl font-extrabold text-slate-800">Generador de QRs</h1>
          <p class="text-slate-500 font-medium">Karpus Kids - Sistema de Acceso</p>
        </div>
      </div>
      <div class="flex gap-3">
        <button onclick="window.print()" class="px-6 py-3 bg-slate-800 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-900 transition-all shadow-lg flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
          Imprimir Todos
        </button>
        <a href="panel_directora.html" class="px-6 py-3 bg-white text-slate-600 border-2 border-slate-100 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-50 transition-all flex items-center gap-2">
          Volver al Panel
        </a>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Formulario (Lado Izquierdo) -->
      <div class="lg:col-span-1 space-y-6 no-print">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100">
          <h2 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-2">
            <span class="w-8 h-8 rounded-xl bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm">1</span>
            Agregar Estudiante
          </h2>
          <form id="qr-form" class="space-y-4">
            <div>
              <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Nombre Completo</label>
              <input type="text" id="name" required placeholder="Ej: Juan Pérez" class="w-full px-5 py-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-2xl outline-none transition-all font-bold text-slate-700">
            </div>
            <div>
              <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Matrícula</label>
              <input type="text" id="matricula" required placeholder="Ej: MAT123" class="w-full px-5 py-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-2xl outline-none transition-all font-bold text-slate-700">
            </div>
            <button type="submit" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-blue-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-200 hover:shadow-indigo-300 hover:-translate-y-1 transition-all active:scale-95">
              Generar Código QR
            </button>
          </form>
        </div>

        <div class="bg-indigo-900 p-8 rounded-[2.5rem] text-white shadow-xl shadow-indigo-900/20">
          <h2 class="text-xl font-black mb-4">Importación Masiva</h2>
          <p class="text-indigo-200 text-sm mb-6 leading-relaxed">Pega una lista con el formato: <br><strong>Nombre, Matrícula</strong> (uno por línea)</p>
          <textarea id="bulk-input" rows="5" placeholder="Juan Perez, KK-2026-1001&#10;Maria Sosa, KK-2026-1002" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-2xl outline-none text-white font-medium mb-4 placeholder:text-white/30"></textarea>
          <button onclick="processBulk()" class="w-full py-4 bg-white text-indigo-900 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-indigo-50 transition-all">
            Procesar Lista
          </button>
        </div>
      </div>

      <!-- Listado (Lado Derecho) -->
      <div class="lg:col-span-2">
        <div id="qr-list" class="grid grid-cols-1 md:grid-cols-2 gap-6 print-area">
          <!-- Tarjetas generadas dinámicamente -->
        </div>
        
        <!-- Estado Vacío -->
        <div id="empty-state" class="text-center py-20 bg-white rounded-[3rem] border-4 border-dashed border-slate-100 no-print">
          <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6 text-slate-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
          </div>
          <p class="text-slate-400 font-bold uppercase tracking-widest text-sm">No hay estudiantes agregados</p>
          <p class="text-slate-300 text-xs mt-2">Agrega uno a la izquierda para comenzar</p>
        </div>
      </div>

    </div>
  </div>

  <script>
    const qrList = document.getElementById('qr-list');
    const qrForm = document.getElementById('qr-form');
    const emptyState = document.getElementById('empty-state');
    let students = [];

    qrForm.onsubmit = (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const matricula = document.getElementById('matricula').value;
      addStudent(name, matricula);
      qrForm.reset();
    };

    function processBulk() {
      const text = document.getElementById('bulk-input').value;
      const lines = text.split('\n');
      lines.forEach(line => {
        const [name, matricula] = line.split(',').map(s => s.trim());
        if (name && matricula) addStudent(name, matricula);
      });
      document.getElementById('bulk-input').value = '';
    }

    function addStudent(name, matricula) {
      const id = Date.now();
      students.push({ id, name, matricula });
      renderCard({ id, name, matricula });
      checkEmpty();
    }

    function renderCard(student) {
      const card = document.createElement('div');
      card.className = 'qr-card bg-white p-6 rounded-[2.5rem] shadow-lg shadow-slate-200/50 border border-slate-100 flex flex-col items-center text-center relative group';
      card.id = `card-${student.id}`;
      
      card.innerHTML = `
        <button onclick="removeStudent(${student.id})" class="no-print absolute top-4 right-4 w-8 h-8 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all hover:bg-rose-500 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <div class="bg-slate-50 p-4 rounded-3xl border-2 border-slate-100 mb-6" id="qr-${student.id}"></div>
        <h3 class="text-lg font-black text-slate-800 leading-tight mb-1">${student.name}</h3>
        <p class="text-xs font-bold text-indigo-600 uppercase tracking-widest">${student.matricula}</p>
        
        <div class="grid grid-cols-2 gap-2 w-full mt-6 no-print">
          <button onclick="downloadQR('${student.matricula}', ${student.id})" class="py-3 bg-indigo-50 text-indigo-600 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-indigo-600 hover:text-white transition-all">Descargar</button>
          <button onclick="printSingle(${student.id})" class="py-3 bg-slate-50 text-slate-600 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-800 hover:text-white transition-all">Imprimir</button>
        </div>
      `;

      qrList.appendChild(card);
      
      new QRCode(document.getElementById(`qr-${student.id}`), {
        text: student.matricula,
        width: 160,
        height: 160,
        colorDark : "#0f172a",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
      });
    }

    function removeStudent(id) {
      students = students.filter(s => s.id !== id);
      document.getElementById(`card-${id}`).remove();
      checkEmpty();
    }

    function checkEmpty() {
      emptyState.style.display = students.length ? 'none' : 'block';
    }

    function downloadQR(matricula, id) {
      const img = document.querySelector(`#qr-${id} img`);
      const link = document.createElement('a');
      link.download = `${matricula}.png`;
      link.href = img.src;
      link.click();
    }

    function printSingle(id) {
      const originalContent = document.body.innerHTML;
      const card = document.getElementById(`card-${id}`).outerHTML;
      
      document.body.innerHTML = `
        <div style="display:flex; justify-content:center; align-items:center; height:100vh;">
          <div class="qr-card" style="width:300px; padding:40px; border:2px solid #eee; border-radius:40px; text-align:center; font-family:sans-serif;">
            ${card}
          </div>
        </div>
      `;
      
      // Eliminar botones del HTML inyectado para la impresión
      document.querySelectorAll('.no-print').forEach(el => el.remove());
      
      window.print();
      location.reload(); // Recargar para restaurar estado
    }
  </script>

</body>
</html>
