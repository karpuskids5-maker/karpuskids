<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karpus Kids — Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" href="logo/favicon.ico" sizes="any">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>window.OneSignalDeferred = window.OneSignalDeferred || [];</script>
  <style>
    * { font-family: 'Nunito', sans-serif; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp .5s ease both; }
    .fade-up-2 { animation: fadeUp .5s .1s ease both; }
    .fade-up-3 { animation: fadeUp .5s .2s ease both; }
    @keyframes wiggle { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
    .wiggle:hover { animation: wiggle .4s ease; }
    .kk .k1{color:#f97316} .kk .k2{color:#3b82f6} .kk .k3{color:#ec4899}
    .kk .k4{color:#22c55e} .kk .k5{color:#f97316} .kk .k6{color:#3b82f6}
    .kk .k7{color:#22c55e} .kk .k8{color:#ec4899} .kk .k9{color:#3b82f6} .kk .k10{color:#f97316}
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 40px #f8fafc inset !important; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-50 via-emerald-50 to-teal-50 flex items-center justify-center p-4">

  <!-- Decorative blobs -->
  <div class="fixed top-0 left-0 w-72 h-72 bg-green-200 rounded-full opacity-30 blur-3xl -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
  <div class="fixed bottom-0 right-0 w-96 h-96 bg-emerald-200 rounded-full opacity-30 blur-3xl translate-x-1/3 translate-y-1/3 pointer-events-none"></div>

  <div class="w-full max-w-sm relative z-10">

    <!-- Logo + Brand -->
    <div class="text-center mb-8 fade-up">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-3xl shadow-lg border-2 border-green-100 mb-4 wiggle cursor-default">
        <img src="img/mundo.jpg" alt="Karpus" class="w-14 h-14 rounded-2xl object-cover">
      </div>
      <h1 class="text-3xl font-black tracking-tight kk">
        <span class="k1">K</span><span class="k2">a</span><span class="k3">r</span><span class="k4">p</span><span class="k5">u</span><span class="k6">s</span>
        <span class="k7">K</span><span class="k8">i</span><span class="k9">d</span><span class="k10">s</span>
      </h1>
      <p class="text-slate-500 font-bold text-sm mt-1">Bienvenido de vuelta 👋</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-7 fade-up-2">

      <form id="loginForm" class="space-y-4">

        <!-- Email -->
        <div>
          <label class="block text-xs font-black text-slate-500 uppercase tracking-wider mb-1.5">Correo</label>
          <input id="email" type="email" placeholder="tu@correo.com" required
            class="w-full px-4 py-3 rounded-2xl border-2 border-slate-100 bg-slate-50 text-slate-800 font-bold text-sm
                   focus:outline-none focus:border-green-400 focus:bg-white focus:ring-4 focus:ring-green-50 transition-all">
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-black text-slate-500 uppercase tracking-wider mb-1.5">Contraseña</label>
          <div class="relative">
            <input id="password" type="password" placeholder="••••••••" required
              class="w-full px-4 py-3 rounded-2xl border-2 border-slate-100 bg-slate-50 text-slate-800 font-bold text-sm
                     focus:outline-none focus:border-green-400 focus:bg-white focus:ring-4 focus:ring-green-50 transition-all pr-12">
            <button type="button" id="togglePwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors p-1">
              👁
            </button>
          </div>
        </div>

        <!-- Error message -->
        <div id="loginError" class="hidden text-xs font-bold text-rose-600 bg-rose-50 border border-rose-100 rounded-xl px-3 py-2"></div>

        <!-- Terms -->
        <div id="termsWrapper" class="flex items-start gap-3 p-3 bg-slate-50 rounded-2xl border border-slate-100">
          <input type="checkbox" id="acceptTerms" required
            class="mt-0.5 w-4 h-4 rounded accent-green-600 cursor-pointer flex-shrink-0">
          <label for="acceptTerms" class="text-xs text-slate-500 font-semibold leading-relaxed cursor-pointer">
            Acepto la
            <a href="politica-privacidad.html" target="_blank" class="text-green-600 font-black hover:underline">Política de Privacidad</a>
            y los
            <a href="terminos-uso.html" target="_blank" class="text-green-600 font-black hover:underline">Términos de Uso</a>
          </label>
        </div>

        <!-- Submit -->
        <button type="submit" id="btnLogin"
          class="w-full py-3.5 bg-green-600 hover:bg-green-700 active:scale-95 text-white font-black rounded-2xl
                 shadow-lg shadow-green-200 transition-all flex items-center justify-center gap-2 text-sm">
          <span id="btnLoginText">Ingresar al Panel</span>
          <span id="btnLoginIcon">→</span>
        </button>

      </form>

      <!-- PWA install -->
      <button id="installAppBtn"
        class="hidden mt-4 w-full py-3 bg-emerald-50 border border-emerald-200 text-emerald-700 font-black rounded-2xl
               text-xs uppercase tracking-wider hover:bg-emerald-100 transition-all flex items-center justify-center gap-2">
        📲 Instalar App
      </button>

    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-slate-400 font-bold mt-5 fade-up-3">
      <a href="index.html" class="hover:text-green-600 transition-colors">← Volver al sitio</a>
      &nbsp;·&nbsp; Karpus Kids © 2026
    </p>

  </div>

  <script type="module" src="js/login.js"></script>
  <script src="js/pwa-install.js" defer></script>
  <script>
    // Toggle password visibility
    document.getElementById('togglePwd')?.addEventListener('click', () => {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    });
  </script>
</body>
</html>
